<div style="padding: 24px; display: grid; gap: 24px;">
  <h2>Custom Select Demo</h2>

  <section>
    <h3>Standalone with FormControl</h3>
    <app-select [placeholder]="'Pick a color'" [formControl]="colorControl" (change)="onColorChange($event)">
      <app-option [value]="'red'">Red</app-option>
      <app-option [value]="'green'">Green</app-option>
      <app-option [value]="'blue'">Blue</app-option>
    </app-select>
    <div style="margin-top:8px; color:#6b7280;">Value: {{ colorControl.value | json }}</div>
  </section>

  <section>
    <h3>Reactive Form with FormControlName</h3>
    <form [formGroup]="form">
      <app-select placeholder="Select country" formControlName="country">
        <app-option [value]="'us'">United States</app-option>
        <app-option [value]="'de'">Germany</app-option>
        <app-option [value]="'jp'">Japan</app-option>
      </app-select>
    </form>
    <div style="margin-top:8px; color:#6b7280;">Form value: {{ form.value | json }}</div>
  </section>
</div>
